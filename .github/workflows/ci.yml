name: Snapshot Workflow

on:
  push:
    branches:
      - master

jobs:
  checks:
    name: Checks Types, Linting and Formatting
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Setup repo
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable pnpm
          corepack prepare pnpm@latest --activate

      - name: Install dependencies
        run: pnpm install

      - name: Run check
        run: pnpm checks
